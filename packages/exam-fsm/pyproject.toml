[project]
name = "exam-fsm"
version = "0.1.0"
description = "Pure IELTS exam state machine (Spec 02) — no I/O, deterministic transitions only"
requires-python = ">=3.11"
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=8.3", "ruff>=0.7"]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["exam_fsm*"]

[tool.ruff]
line-length = 100
target-version = "py311"
