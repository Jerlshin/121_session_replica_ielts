name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ielts
          POSTGRES_PASSWORD: ielts
          POSTGRES_DB: ielts_speaking
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ielts -d ielts_speaking"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      rabbitmq:
        image: rabbitmq:3-management-alpine
        env:
          RABBITMQ_DEFAULT_USER: ielts
          RABBITMQ_DEFAULT_PASS: ielts
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://ielts:ielts@localhost:5432/ielts_speaking
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: amqp://ielts:ielts@localhost:5672//
      S3_ENDPOINT_URL: http://localhost:9000
      S3_ACCESS_KEY: ielts
      S3_SECRET_KEY: ielts-dev-secret
      S3_BUCKET: ielts-media

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Start MinIO
        # GitHub Actions `services:` can't override a container's command,
        # and MinIO needs `server /data` — so it's run as a plain step
        # instead of a service container.
        run: |
          docker run -d --name minio -p 9000:9000 \
            -e MINIO_ROOT_USER=ielts -e MINIO_ROOT_PASSWORD=ielts-dev-secret \
            minio/minio:latest server /data
          for i in $(seq 1 20); do
            curl -sf http://localhost:9000/minio/health/ready && exit 0
            sleep 2
          done
          echo "MinIO did not become ready in time" >&2
          exit 1

      - name: Install exam-fsm
        # A local, unpublished path package — installed as a sibling
        # editable install rather than declared as a PEP 508 dependency of
        # api-gateway (Spec 04 §2 Phase 3), same pragmatic approach the repo
        # already uses for cross-app test imports.
        run: pip install -e packages/exam-fsm

      - name: Install api-gateway
        run: pip install -e "apps/api-gateway[dev]"

      - name: Install worker
        run: pip install -e "apps/worker[dev]"

      - name: Ruff lint
        run: ruff check apps/api-gateway apps/worker packages tests

      - name: Run migrations
        run: alembic -c migrations/alembic.ini upgrade head

      - name: Unit tests
        run: pytest packages/exam-fsm/tests tests/unit apps/api-gateway/app/tests apps/worker/tests

      - name: Integration tests
        run: pytest tests/integration
