# Points Grafana's dashboard provider at the JSON dashboard shipped in
# this repo, so it's live on first `docker-compose up` (Spec 04 §2 Phase 8).
apiVersion: 1

providers:
  - name: ielts-dashboards
    folder: IELTS Platform
    type: file
    updateIntervalSeconds: 30
    options:
      path: /etc/grafana/provisioning/dashboards/json
